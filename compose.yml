services:
  server:
    build: .
    container_name: bia
    ports:
      - 3001:8080
    depends_on:
      - database
      - redis
    environment:
      DB_USER: postgres
      DB_PWD: postgres
      DB_HOST: database
      DB_PORT: 5432
      ## NAO PRECISA NA IMERSÃO DAQUI PRA BAIXO ## 
      # DB_SECRET_NAME: 
      # DB_REGION: 
      # AWS_ACCESS_KEY_ID: 
      # AWS_SECRET_ACCESS_KEY:
      # DEBUG_SECRET: 
      # IS_LOCAL: true 
      # CACHE_ENDPOINT: redis
      # CACHE_PORT: 6379
      # CACHE_TTL: 15
      # CACHE_TLS: false
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8080/api/versao"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 5s     
  database:
    image: postgres:17.1
    container_name: database
    environment:
      - "POSTGRES_USER=postgres"
      - "POSTGRES_PASSWORD=postgres"
      - "POSTGRES_DB=bia"
    ports:
      - 5433:5432
    volumes:
      - db:/var/lib/postgresql/data
  redis:
    image: valkey/valkey:8.1-alpine
    container_name: redis
    ports:
      - 6379:6379
volumes:
  db:
